{% extends "base.html" %} {% block title %}تسجيل الدخول - NebaxusBeta{% endblock %}
{% block extra_css %}
<style>
  .min-vh-100 {
    min-height: 100vh;
  }
  /* إخفاء الشريط السفلي في صفحة تسجيل الدخول */
  .bottom-nav {
    display: none !important;
  }
  body {
    padding-bottom: 0 !important;
  }

  /* Login button — inherits btn-primary from base */

  /* خلفية اللوجو */
  .logo-container {
    background-color: #d79921;
    border-radius: 10px;
    padding: 10px;
    display: inline-block;
    box-shadow: 0 2px 8px rgba(215, 153, 33, 0.3);
  }

  /* توسيع الكارت على الموبايل: تقليل حواف الحاوية والـgutter */
  @media (max-width: 576px) {
    .login-container {
      padding-left: 8px;
      padding-right: 8px;
      padding-top: calc(46px + env(safe-area-inset-top));
    }
    .login-row {
      margin-left: 0;
      margin-right: 0;
      align-items: flex-start !important;
      min-height: auto !important;
      padding-top: 0;
    }
    .login-col {
      padding-left: 0;
      padding-right: 0;
    }
    /* ضبط محاذاة ومدى الحقول على الموبايل */
    .login-card .input-group {
      display: flex !important;
      flex-direction: row !important;
      align-items: stretch !important;
      flex-wrap: nowrap !important;
      gap: 0 !important;
    }
    .login-card .input-group .form-control {
      width: 100% !important;
      flex: 1 1 auto !important;
      height: auto !important;
      padding: 0.375rem 0.75rem !important;
      font-size: 1rem !important;
    }
    .login-card .input-group .input-group-text {
      height: auto !important;
      padding: 0.375rem 0.75rem !important;
    }
    .login-card label.form-label {
      font-size: 1rem !important;
    }
    /* تقليل padding داخل الكارت على الموبايل لزيادة المساحة الفعلية */
    .login-card .card-body {
      padding: 1rem 0.9rem !important;
    }

    /* تأكيد عدم وجود مسافة بين الأيقونة والحقل (اعتمادًا على Bootstrap الافتراضي) */
    .login-card .input-group > .input-group-text,
    .login-card .input-group > .form-control {
      margin: 0 !important;
    }
  }
</style>
{% endblock %} {% block content %}
<div class="container-fluid login-container">
  <div
    class="row justify-content-center align-items-center min-vh-100 g-0 g-sm-4 login-row"
  >
    <div class="login-col col-12 col-md-6 col-lg-5">
      <div class="card shadow-lg login-card">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <img
              src="/static/img/logo.svg"
              alt="شعار NebaxusBeta"
              height="80"
              class="app-logo"
            />
          </div>


          <form method="POST">
            <div class="mb-3">
              <label for="username" class="form-label">اسم المستخدم</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="fas fa-user"></i>
                </span>
                <input
                  type="text"
                  class="form-control"
                  id="username"
                  name="username"
                  required
                />
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">كلمة المرور</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="fas fa-lock"></i>
                </span>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  name="password"
                  required
                />
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-2">
              <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>

            <div class="text-center">
              <small class="text-muted">
                <i class="fas fa-info-circle"></i>
                حساب موظف نشط مطلوب
              </small>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
