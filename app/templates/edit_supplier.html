{% extends 'base.html' %}

{% block content %}
<style>
  /* Hide number input spinners for all browsers */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type=number] {
    -moz-appearance: textfield;
  }
</style>
<div class="container py-4" dir="rtl">

    <div class="text-center mb-4">
        <h2 class="fw-bold">تعديل <span class="text-warning">بيانات المورد</span></h2>
        <p class="text-muted">قم بتعديل البيانات المطلوبة ثم اضغط حفظ</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <form method="POST" class="bg-white border rounded-4 shadow-sm p-4">
                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">اسم المورد</label>
                    <input type="text" id="name" name="name" class="form-control" value="{{ supplier.name }}" required>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label fw-semibold">رقم الهاتف</label>
                    <input type="text" id="phone" name="phone" class="form-control" value="{{ supplier.phone }}" required>
                </div>

                <div class="mb-3">
                    <label for="address" class="form-label fw-semibold">العنوان</label>
                    <input type="text" id="address" name="address" class="form-control" value="{{ supplier.address }}" required>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save"></i> حفظ التعديلات
                    </button>
                    <a href="{{ url_for('main.supplier_profile', supplier_id=supplier.id) }}" class="btn btn-secondary d-inline-flex align-items-center gap-1 px-4">
                        <i class="fas fa-arrow-left"></i> <span>رجوع</span>
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
