{% extends 'base.html' %}

{% block content %}
<div class="container py-4" dir="rtl">
  <div class="text-center mb-4">
    <h2 class="fw-bold">إضافة <span class="text-warning">متابعة</span></h2>
    <p class="text-muted">ابحث عن العميل برقم الهاتف أو الاسم وأدخل المشكلة</p>
  </div>

  <div class="card card-box p-3">
    <form method="POST">
      <div class="row g-2 align-items-end">
        <div class="col-md-6 col-12">
          <label class="form-label">رقم تليفون العميل / الاسم</label>
          <select id="customerSearch" name="customer_id" class="form-select" required></select>
        </div>
        <div class="col-md-6 col-12">
          <label class="form-label">المشكلة</label>
          <input type="text" name="problem" class="form-control" placeholder="اكتب المشكلة" required>
        </div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-success d-flex align-items-center gap-1">
          <i class="fas fa-plus"></i>
          <span>إضافة</span>
        </button>

      </div>
    </form>
  </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.rtl.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
$(function(){
  $('#customerSearch').select2({
    theme: 'bootstrap-5',
    width: '100%',
    dir: 'rtl',
    placeholder: 'ابحث برقم الهاتف أو الاسم',
    minimumInputLength: 1,
    ajax: {
  url: "{{ url_for('main.api_search_customers') }}",
      dataType: 'json',
      delay: 250,
      data: function (params) { return { q: params.term }; },
      processResults: function (data) { return data; },
      cache: true
    },
    language: {
      inputTooShort: function(){ return 'اكتب حرفًا واحدًا على الأقل'; },
      searching: function(){ return 'جارٍ البحث...'; },
      noResults: function(){ return 'لا توجد نتائج'; }
    },
    templateResult: function (item) {
      if (!item.id) return item.text;
      return $(
        '<div class="d-flex flex-column">'
        + '<strong>' + (item.name || '') + '</strong>'
        + '<small class="text-muted">' + (item.phone || '') + ' — ' + (item.address || '') + '</small>'
        + '</div>'
      );
    },
    templateSelection: function (item) { return item.text || item.name || ''; }
  });
});
</script>
{% endblock %}
