{% extends 'base.html' %}
{% block content %}
<div class="container py-4" dir="rtl">
  <div class="text-center mb-4">
    <h2 class="fw-bold">إضافة <span class="text-warning">منتج تالف</span></h2>
    <p class="text-muted">ابحث عن المنتج، حدّد الكمية، وسجّل الملاحظة</p>
  </div>

  <form method="POST" action="{{ url_for('main.add_damaged_product') }}" id="addDamagedProductForm">
    <div class="row g-3 align-items-end mb-3">
      <div class="col-md-6">
        <label class="form-label fw-semibold">المنتج</label>
        <select id="productSelect" name="product_id" class="form-select" required>
          <option value=""></option>
          {% for p in products %}
            <option value="{{ p.id }}">{{ p.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label fw-semibold">الكمية</label>
        <input type="number" name="quantity" min="1" value="1" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold">ملاحظة</label>
        <input type="text" name="notes" class="form-control" placeholder="سبب التلف (اختياري)">
      </div>
    </div>

    <div class="d-flex gap-2 mt-3">
      <button type="submit" class="btn btn-primary d-inline-flex align-items-center gap-1">
        <i class="fas fa-save"></i> <span>حفظ</span>
      </button>

    </div>
  </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.rtl.min.css" rel="stylesheet" />
<script>
  $(function(){
    $('#productSelect').select2({
      theme: 'bootstrap-5',
      width: '100%',
      placeholder: 'ابحث باسم المنتج',
      minimumInputLength: 0
    });
  });
</script>
{% endblock %}
