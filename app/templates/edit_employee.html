{% extends "base.html" %}

{% block title %}تعديل بيانات الموظف{% endblock %}

{% block content %}
<style>
  /* Hide number input spinners for all browsers */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type=number] {
    -moz-appearance: textfield;
  }
</style>
<div class="container py-4" dir="rtl">

    <div class="text-center mb-4">
        <h2 class="fw-bold">تعديل <span class="text-warning">بيانات الموظف</span></h2>
        <p class="text-muted">قم بتعديل البيانات المطلوبة ثم اضغط حفظ</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <form method="POST" class="bg-white border rounded-4 shadow-sm p-4">
                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">الاسم الكامل</label>
                    <input type="text" id="name" name="name" class="form-control" value="{{ employee.name or '' }}" required>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label fw-semibold">رقم الهاتف</label>
                    <input type="text" id="phone" name="phone" class="form-control" value="{{ employee.phone or '' }}" required>
                </div>

                <div class="mb-3">
                    <label for="position" class="form-label fw-semibold">الوظيفة</label>
                    <input type="text" id="position" name="position" class="form-control" value="{{ employee.position or '' }}" required>
                </div>

                <div class="mb-3">
                    <label for="hire_date" class="form-label fw-semibold">تاريخ التعيين</label>
                    <div class="date-dmy-wrapper w-100">
                      <input type="text" class="form-control" placeholder="dd/mm/yyyy" readonly value="{{ employee.hire_date.strftime('%d/%m/%Y') if employee.hire_date else '' }}">
                      <input type="date" id="hire_date" name="hire_date" value="{{ employee.hire_date.strftime('%Y-%m-%d') if employee.hire_date else '' }}" required onchange="this.previousElementSibling.value=this.value.split('-').reverse().join('/')">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="salary" class="form-label fw-semibold">المرتب الأساسي</label>
                    <input type="number" id="salary" name="salary" class="form-control" step="0.01" min="0" value="{{ employee.salary or 0 }}" required>
                </div>

                <div class="mb-3">
                    <label for="sales_commission_percentage" class="form-label fw-semibold">نسبة المبيعات (%)</label>
                    <input type="number" id="sales_commission_percentage" name="sales_commission_percentage" class="form-control" step="0.01" min="0" max="100" value="{{ employee.sales_commission_percentage or 0 }}" placeholder="أدخل نسبة المبيعات">
                </div>

                <div class="mb-3 form-check">
                    <input class="form-check-input" type="checkbox" id="requires_attendance" name="requires_attendance" {% if employee.requires_attendance %}checked{% endif %}>
                    <label class="form-check-label" for="requires_attendance">يتطلب تسجيل حضور يومي</label>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">اسم المستخدم</label>
                    <input type="text" id="username" name="username" class="form-control" value="{{ employee.username or '' }}" required>
                </div>

                <div class="mb-3">
                    <label for="new_password" class="form-label fw-semibold">كلمة المرور الجديدة</label>
                    <input type="password" id="new_password" name="new_password" class="form-control">
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save"></i> حفظ التعديلات
                    </button>

                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
