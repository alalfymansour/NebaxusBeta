{% extends 'base.html' %}
{% block content %}
<div class="container py-4" dir="rtl">
  <div class="text-center mb-4">
    <h2 class="fw-bold">إضافة <span class="text-warning">طلب إرجاع</span></h2>
    <p class="text-muted">تسجيل إرجاع منتجات من طلب أو استبدال</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card card-box p-4">
        <div class="mb-3">
          <label class="form-label">رقم هاتف العميل</label>
          <div class="input-group">
            <input id="customerPhone" class="form-control" placeholder="أدخل رقم الهاتف..." autocomplete="off">
            <button id="searchCustomerBtn" class="btn btn-primary" type="button"><i class="fas fa-search"></i> بحث</button>
          </div>
        </div>
        <div id="customerInfo" class="mb-3" style="display:none;">
          <div class="alert alert-info d-flex justify-content-between align-items-center py-2">
            <span id="customerNameDisplay" class="fw-bold"></span>
            <input type="hidden" id="customerId">
            <button class="btn btn-sm btn-outline-danger" onclick="resetCustomer()"><i class="fas fa-times"></i></button>
          </div>
        </div>
        <div id="sourceSection" style="display:none;">
          <div class="mb-3">
            <label class="form-label">اختر المصدر</label>
            <div class="d-flex gap-2 mb-2">
              <button id="sourceOrderBtn" class="btn btn-outline-primary flex-fill" onclick="selectSource('order')">طلب عادي</button>
              <button id="sourceReplacementBtn" class="btn btn-outline-info flex-fill" onclick="selectSource('replacement_order')">طلب استبدال</button>
            </div>
          </div>
          <div id="ordersList" style="display:none;" class="mb-3">
            <label class="form-label">اختر الطلب</label>
            <select id="sourceSelect" class="form-select" onchange="loadOrderItems()">
              <option value="">-- اختر --</option>
            </select>
          </div>
          <div id="itemsSection" style="display:none;">
            <label class="form-label">المنتجات المرتجعة</label>
            <div id="itemsList" class="mb-3"></div>
            <div class="d-flex gap-2 mt-4 justify-content-center">
              <button id="submitReturnBtn" class="btn btn-success d-flex align-items-center gap-1 px-4" onclick="submitReturn()">
                <i class="fas fa-check"></i> <span>تسجيل طلب الإرجاع</span>
              </button>
              <a href="{{ url_for('main.replacement_orders') }}" class="btn btn-secondary d-inline-flex align-items-center gap-1">
                <i class="fas fa-arrow-left"></i> <span>رجوع</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let selectedCustomerId = null;
let selectedSourceType = null;
let currentItems = [];

function resetCustomer() {
  selectedCustomerId = null;
  document.getElementById('customerInfo').style.display = 'none';
  document.getElementById('sourceSection').style.display = 'none';
  document.getElementById('customerPhone').value = '';
  selectedSourceType = null;
  document.getElementById('ordersList').style.display = 'none';
  document.getElementById('itemsSection').style.display = 'none';
}

document.getElementById('searchCustomerBtn').addEventListener('click', function() {
  const phone = document.getElementById('customerPhone').value.trim();
  if (!phone) { alert('الرجاء إدخال رقم الهاتف'); return; }
  fetch('{{ url_for("main.api_search_customers") }}?q=' + encodeURIComponent(phone))
    .then(r => r.json()).then(d => {
    if (d.results && d.results.length > 0) {
      const c = d.results[0];
      selectedCustomerId = c.id;
      document.getElementById('customerNameDisplay').textContent = c.name + ' - ' + c.phone;
      document.getElementById('customerInfo').style.display = 'block';
      document.getElementById('sourceSection').style.display = 'block';
    } else {
      alert('لم يتم العثور على عميل');
    }
  }).catch(() => alert('خطأ في الاتصال'));
});

function selectSource(type) {
  selectedSourceType = type;
  document.getElementById('sourceOrderBtn').classList.toggle('btn-primary', type === 'order');
  document.getElementById('sourceOrderBtn').classList.toggle('btn-outline-primary', type !== 'order');
  document.getElementById('sourceReplacementBtn').classList.toggle('btn-info', type === 'replacement_order');
  document.getElementById('sourceReplacementBtn').classList.toggle('btn-outline-info', type !== 'replacement_order');

  fetch('/orders/returns/customer-orders', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({customer_id: selectedCustomerId, source_type: type})
  }).then(r => r.json()).then(d => {
    const sel = document.getElementById('sourceSelect');
    sel.innerHTML = '<option value="">-- اختر --</option>';
    if (d.orders && d.orders.length > 0) {
      d.orders.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.id;
        opt.textContent = '#' + o.id + ' - ' + (o.date || '') + ' - ' + (o.total_amount || 0) + ' ج.م';
        sel.appendChild(opt);
      });
    }
    document.getElementById('ordersList').style.display = 'block';
    document.getElementById('itemsSection').style.display = 'none';
  }).catch(() => alert('خطأ في تحميل الطلبات'));
}

(function initFromQueryParams() {
  const params = new URLSearchParams(window.location.search);
  const sourceType = params.get('source_type');
  const sourceId = params.get('source_id');
  const customerId = params.get('customer_id');
  if (!sourceType || !sourceId || !customerId) return;

  selectedCustomerId = parseInt(customerId);
  selectedSourceType = sourceType;

  document.getElementById('customerPhone').value = '...';
  document.getElementById('searchCustomerBtn').disabled = true;

  function setCustomerName(name) {
    document.getElementById('customerNameDisplay').textContent = name || ('عميل #' + customerId);
  }

  fetch('{{ url_for("main.api_search_customers") }}?q=' + customerId + '&by=id')
    .then(r => r.json()).then(d => {
    if (d.results && d.results.length > 0) {
      const c = d.results[0];
      setCustomerName(c.name + ' - ' + c.phone);
    } else {
      setCustomerName(null);
    }
  }).catch(() => setCustomerName(null));

  document.getElementById('customerInfo').style.display = 'block';
  document.getElementById('sourceSection').style.display = 'block';
  selectSource(sourceType);
  setTimeout(function() {
    const sel = document.getElementById('sourceSelect');
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value == sourceId) {
        sel.value = sourceId;
        loadOrderItems();
        break;
      }
    }
  }, 300);
})();

function loadOrderItems() {
  const sourceId = document.getElementById('sourceSelect').value;
  if (!sourceId) { document.getElementById('itemsSection').style.display = 'none'; return; }

  fetch('/orders/returns/order-items', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({source_id: sourceId, source_type: selectedSourceType})
  }).then(r => r.json()).then(d => {
    const container = document.getElementById('itemsList');
    container.innerHTML = '';
    currentItems = [];
    if (d.items && d.items.length > 0) {
      d.items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'card mb-2 p-3';
        div.innerHTML = `
          <div class="d-flex justify-content-between align-items-center">
            <div><strong>${item.product_name || 'منتج'}</strong> <span class="text-muted">x${item.quantity}</span></div>
            <div>${item.price} ج.م</div>
          </div>
          <div class="row mt-2 g-2">
            <div class="col-lg-4 col-md-6 col-12">
              <input type="number" class="form-control return-qty" min="1" max="${item.quantity}" value="${item.quantity}" data-product-id="${item.product_id}">
            </div>
            <div class="col-lg-4 col-md-6 col-12">
              <select class="form-select return-condition" data-product-id="${item.product_id}">
                <option value="سليم">سليم</option>
                <option value="تالف">تالف</option>
              </select>
            </div>
            <div class="col-lg-4 col-md-12 col-12">
              <input type="text" class="form-control return-reason" placeholder="سبب الإرجاع" data-product-id="${item.product_id}">
            </div>
          </div>

        `;
        container.appendChild(div);
        currentItems.push({
          product_id: item.product_id,
          max_qty: item.quantity
        });
      });
    } else {
      container.innerHTML = '<div class="alert alert-warning">لا توجد منتجات في هذا الطلب</div>';
    }
    document.getElementById('itemsSection').style.display = 'block';
  }).catch(() => alert('خطأ في تحميل المنتجات'));
}

function submitReturn() {
  const btn = document.getElementById('submitReturnBtn');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>جاري الحفظ...</span>';

  const sourceId = document.getElementById('sourceSelect').value;
  const items = [];
  let valid = true;

  document.querySelectorAll('.return-qty').forEach(el => {
    const pid = parseInt(el.dataset.productId);
    const qty = parseInt(el.value) || 0;
    const condition = document.querySelector(`.return-condition[data-product-id="${pid}"]`).value;
    const reason = document.querySelector(`.return-reason[data-product-id="${pid}"]`).value.trim();
    if (qty > 0) {
      if (!reason) { valid = false; }
      items.push({product_id: pid, quantity: qty, item_condition: condition, return_reason: reason});
    }
  });

  if (!valid) { alert('الرجاء إدخال سبب الإرجاع لجميع المنتجات'); return; }
  if (items.length === 0) { alert('الرجاء اختيار منتج واحد على الأقل'); return; }

  fetch('{{ url_for("main.add_return_order") }}', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      customer_id: selectedCustomerId,
      source_type: selectedSourceType,
      source_id: parseInt(sourceId),
      items: items
    })
  }).then(r => r.json()).then(d => {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-check"></i> <span>تسجيل طلب الإرجاع</span>';
    if (d.success) {
      window.location.href = d.redirect;
    } else {
      showFlashMessage(d.error || 'حدث خطأ', 'danger');
    }
  }).catch(() => {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-check"></i> <span>تسجيل طلب الإرجاع</span>';
    showFlashMessage('خطأ في الاتصال بالخادم', 'danger');
  });
}
</script>
{% endblock %}
