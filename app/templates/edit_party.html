{% extends 'base.html' %}

{% block content %}
<div class="container py-4" dir="rtl">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0"><i class="fas fa-user-edit me-2"></i>تعديل بيانات المتعامل</h4>
        </div>
        <div class="card-body">
          <form method="POST" action="{{ url_for('main.edit_party', party_id=party.id) }}">
            
            <div class="mb-3">
              <label for="name" class="form-label">اسم المتعامل <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="name" name="name" value="{{ party.name }}" required>
            </div>

            <div class="mb-3">
              <label for="phone" class="form-label">رقم الهاتف</label>
              <input type="text" class="form-control" id="phone" name="phone" value="{{ party.phone or '' }}">
            </div>

            <div class="mb-3">
              <label for="address" class="form-label">العنوان</label>
              <input type="text" class="form-control" id="address" name="address" value="{{ party.address or '' }}">
            </div>

            <div class="mb-3">
              <label for="notes" class="form-label">ملاحظات</label>
              <textarea class="form-control" id="notes" name="notes" rows="3">{{ party.notes or '' }}</textarea>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-save me-2"></i>حفظ التعديلات
              </button>
              <a href="{{ url_for('main.party_profile', party_id=party.id) }}" class="btn btn-secondary">
                <i class="fas fa-times me-2"></i>إلغاء
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
