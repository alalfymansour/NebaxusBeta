{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
  <div class="text-center mb-4">
    <h2 class="fw-bold">تعديل <span class="text-warning">الفاتورة رقم {{ invoice.invoice_number }}</span></h2>
    <p class="text-muted">قم بتعديل بيانات الفاتورة</p>
  </div>

  <form method="POST" action="{{ url_for('main.edit_invoice', invoice_id=invoice.id) }}">
    <div class="mb-4">
      <label class="form-label fw-semibold d-block mb-2">بيانات المورد</label>
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label fw-semibold">اسم المورد</label>
          <select class="form-select" name="supplier_id" required>
            {% for supplier in suppliers %}
            <option value="{{ supplier.id }}" {% if supplier.id == invoice.supplier_id %}selected{% endif %}>
              {{ supplier.name }} - {{ supplier.phone or 'بدون هاتف' }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">رقم الفاتورة</label>
          <input type="text" class="form-control" name="invoice_number" id="invoice_number" value="{{ invoice.invoice_number }}" required>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">تاريخ الفاتورة</label>
          <input type="date" class="form-control" name="date" id="date" value="{{ invoice.date.strftime('%Y-%m-%d') }}" required>
        </div>
        <div class="col-md-2">
          <label class="form-label fw-semibold">المبلغ المدفوع</label>
          <input name="paid_amount" id="paidAmount" type="number" step="0.01" class="form-control" value="{{ invoice.paid_amount }}" oninput="calculateTotals()" onchange="calculateTotals()">
        </div>
      </div>
    </div>

    <hr>

    <h5 class="fw-bold mb-3">المنتجات</h5>
    <div id="products-container">
      {% for item in invoice.items %}
      <div class="row g-2 mb-3">
        <div class="col-md-3">
          <label class="form-label">اسم المنتج</label>
          <input type="text" class="form-control product-search" name="products[{{ loop.index0 }}][product_name]" value="{{ item.product.name }}" placeholder="اكتب اسم المنتج للبحث" required oninput="searchProduct(this, {{ loop.index0 }})">
          <div class="product-search-results" style="display: none; position: absolute; z-index: 1000; background: white; border: 1px solid #ddd; border-radius: 4px; max-height: 200px; overflow-y: auto; width: 100%;"></div>
          <input type="hidden" name="products[{{ loop.index0 }}][product_id]" class="product-id" value="{{ item.product_id }}">
        </div>
        <div class="col-md-2">
          <label class="form-label">الكمية</label>
          <input type="number" class="form-control" name="products[{{ loop.index0 }}][quantity]" min="1" value="{{ item.quantity }}" required onchange="calculateTotals()" oninput="calculateTotals()">
        </div>
        <div class="col-md-2">
          <label class="form-label">سعر الشراء</label>
          <input type="number" step="0.01" class="form-control purchase-price" name="products[{{ loop.index0 }}][purchase_price]" value="{{ item.purchase_price }}" required onchange="calculateTotals()" oninput="calculateTotals()">
        </div>
        <div class="col-md-2">
          <label class="form-label">سعر البيع</label>
          <input type="number" step="0.01" class="form-control selling-price" name="products[{{ loop.index0 }}][selling_price]" value="{{ item.selling_price }}" required onchange="calculateTotals()" oninput="calculateTotals()">
        </div>
        <div class="col-md-2">
          <label class="form-label">الإجمالي</label>
          <input type="text" class="form-control item-total bg-light" readonly value="{{ (item.quantity * item.purchase_price)|round(2) }} ج.م">
        </div>
        <div class="col-md-1">
          <label class="form-label">&nbsp;</label>
          <button type="button" class="btn btn-danger btn-sm w-100" onclick="removeProduct(this)">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>
      {% endfor %}
    </div>
    
    <button type="button" class="btn btn-secondary mb-4" onclick="addProduct()">
      <i class="fas fa-plus"></i> <span>إضافة منتج</span>
    </button>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <label class="form-label fw-semibold">إجمالي الفاتورة</label>
        <input id="totalAmount" type="text" class="form-control bg-light" readonly value="{{ invoice.total_amount|round(2) }} ج.م">
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold">المتبقي</label>
        <input id="remainingAmount" type="text" class="form-control bg-light" readonly value="{{ (invoice.total_amount - invoice.paid_amount)|round(2) }} ج.م">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">ملاحظات</label>
      <textarea class="form-control" name="notes" rows="3" placeholder="ملاحظات اختيارية">{{ invoice.notes or '' }}</textarea>
    </div>

    <div class="d-flex gap-2 mt-4 flex-wrap">
      <button type="submit" class="btn btn-primary d-flex align-items-center gap-1">
        <i class="fas fa-save"></i> <span>حفظ التعديلات</span>
      </button>
      <a href="{{ url_for('main.view_invoice', invoice_id=invoice.id) }}" class="btn btn-secondary d-inline-flex align-items-center gap-1 px-4">
        <i class="fas fa-arrow-left"></i> <span>إلغاء</span>
      </a>
    </div>
  </form>
</div>

<script>
let productIndex = {{ invoice.items|length }};

function searchProduct(input, index) {
  const searchTerm = input.value.trim();
  const resultsDiv = input.parentNode.querySelector('.product-search-results');
  
  if (searchTerm.length < 2) {
    resultsDiv.style.display = 'none';
    return;
  }
  
  fetch(`/api/search_products?term=${encodeURIComponent(searchTerm)}`)
    .then(response => response.json())
    .then(data => {
      if (data.success && data.products.length > 0) {
        resultsDiv.innerHTML = '';
        data.products.forEach(product => {
          const div = document.createElement('div');
          div.className = 'p-2 border-bottom product-result';
          div.style.cursor = 'pointer';
          div.innerHTML = `
            <div class="fw-bold">${product.name}</div>
            <small class="text-muted">السعر: ${product.price} ج.م | المخزون: ${product.stock}</small>
          `;
          div.onclick = () => selectProduct(input, product, index);
          resultsDiv.appendChild(div);
        });
        resultsDiv.style.display = 'block';
      } else {
        resultsDiv.style.display = 'none';
      }
    })
    .catch(error => {
      console.error('خطأ في البحث:', error);
    });
}

function selectProduct(input, product, index) {
  input.value = product.name;
  input.parentNode.querySelector('.product-id').value = product.id;
  input.parentNode.querySelector('.product-search-results').style.display = 'none';
  
  const row = input.closest('.row');
  row.querySelector('.purchase-price').value = product.purchase_price || product.wholesale_price || 0;
  row.querySelector('.selling-price').value = product.price || 0;
  
  calculateTotals();
}

function addProduct() {
  const container = document.getElementById('products-container');
  const productRow = document.createElement('div');
  productRow.className = 'row g-2 mb-3';
  productRow.innerHTML = `
    <div class="col-md-3">
      <label class="form-label">اسم المنتج</label>
      <input type="text" class="form-control product-search" name="products[${productIndex}][product_name]" placeholder="اكتب اسم المنتج للبحث" required oninput="searchProduct(this, ${productIndex})">
      <div class="product-search-results" style="display: none; position: absolute; z-index: 1000; background: white; border: 1px solid #ddd; border-radius: 4px; max-height: 200px; overflow-y: auto; width: 100%;"></div>
      <input type="hidden" name="products[${productIndex}][product_id]" class="product-id">
    </div>
    <div class="col-md-2">
      <label class="form-label">الكمية</label>
      <input type="number" class="form-control" name="products[${productIndex}][quantity]" min="1" value="1" required onchange="calculateTotals()" oninput="calculateTotals()">
    </div>
    <div class="col-md-2">
      <label class="form-label">سعر الشراء</label>
      <input type="number" step="0.01" class="form-control purchase-price" name="products[${productIndex}][purchase_price]" required onchange="calculateTotals()" oninput="calculateTotals()">
    </div>
    <div class="col-md-2">
      <label class="form-label">سعر البيع</label>
      <input type="number" step="0.01" class="form-control selling-price" name="products[${productIndex}][selling_price]" required onchange="calculateTotals()" oninput="calculateTotals()">
    </div>
    <div class="col-md-2">
      <label class="form-label">الإجمالي</label>
      <input type="text" class="form-control item-total bg-light" readonly>
    </div>
    <div class="col-md-1">
      <label class="form-label">&nbsp;</label>
      <button type="button" class="btn btn-danger btn-sm w-100" onclick="removeProduct(this)">
        <i class="fas fa-trash"></i>
      </button>
    </div>
  `;
  container.appendChild(productRow);
  productIndex++;
  calculateTotals();
}

function removeProduct(button) {
  const row = button.closest('.row');
  row.remove();
  calculateTotals();
}

function calculateTotals() {
  let totalAmount = 0;
  
  const productRows = document.querySelectorAll('#products-container .row');
  
  productRows.forEach((row, index) => {
    const quantityInput = row.querySelector('input[name*="[quantity]"]');
    const purchasePriceInput = row.querySelector('.purchase-price');
    const itemTotalInput = row.querySelector('.item-total');
    
    if (quantityInput && purchasePriceInput && itemTotalInput) {
      const quantity = parseInt(quantityInput.value) || 0;
      const purchasePrice = parseFloat(purchasePriceInput.value) || 0;
      const itemTotal = quantity * purchasePrice;
      
      itemTotalInput.value = itemTotal.toFixed(0) + ' ج.م';
      totalAmount += itemTotal;
    }
  });
  
  const paidAmount = parseFloat(document.getElementById('paidAmount').value) || 0;
  const remainingAmount = totalAmount - paidAmount;
  
  document.getElementById('totalAmount').value = totalAmount.toFixed(0) + ' ج.م';
  document.getElementById('remainingAmount').value = remainingAmount.toFixed(0) + ' ج.م';
  
  const remainingElement = document.getElementById('remainingAmount');
  if (remainingAmount < 0) {
    remainingElement.style.color = 'red';
  } else {
    remainingElement.style.color = 'black';
  }
}

document.addEventListener('DOMContentLoaded', function() {
  calculateTotals();
  
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.product-search') && !e.target.closest('.product-search-results')) {
      document.querySelectorAll('.product-search-results').forEach(div => {
        div.style.display = 'none';
      });
    }
  });
});
</script>

{% endblock %}
