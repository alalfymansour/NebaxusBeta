{% extends 'base.html' %}

{% block content %}
<style>
  /* Hide number input spinners for all browsers */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type=number] {
    -moz-appearance: textfield;
  }
</style>
<div class="container py-4" dir="rtl">

    <div class="text-center mb-4">
        <h2 class="fw-bold">إضافة <span class="text-warning">موظف جديد</span></h2>
        <p class="text-muted">يرجى إدخال بيانات الموظف بشكل صحيح</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <form method="POST" class="bg-white border rounded-4 shadow-sm p-4">
                <div class="mb-3">
                    <label class="form-label fw-semibold">الاسم الكامل</label>
                    <input type="text" name="name" class="form-control" required placeholder="">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">رقم الهاتف</label>
                    <input type="text" name="phone" class="form-control" required placeholder="">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">الوظيفة</label>
                    <input type="text" name="position" class="form-control" required placeholder="">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">تاريخ التعيين</label>
                    <div class="date-dmy-wrapper w-100">
                      <input type="text" class="form-control" placeholder="dd/mm/yyyy" readonly>
                      <input type="date" name="hire_date" required onchange="this.previousElementSibling.value=this.value.split('-').reverse().join('/')">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">المرتب الشهري</label>
                    <input type="number" step="0.01" name="salary" class="form-control" required placeholder="">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">نسبة المبيعات (%)</label>
                    <input type="number" step="0.01" min="0" max="100" name="sales_commission_percentage" class="form-control" value="0" placeholder="نسبة المبيعات من العمليات">
                </div>
                <div class="mb-3 form-check">
                    <input class="form-check-input" type="checkbox" id="requires_attendance" name="requires_attendance">
                    <label class="form-check-label" for="requires_attendance">يتطلب تسجيل حضور يومي</label>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">اسم المستخدم</label>
                    <input type="text" name="username" class="form-control" required placeholder="">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">كلمة المرور</label>
                    <input type="password" name="password" class="form-control" required placeholder="">
                </div>
                <div class="d-flex justify-content-between mt-4">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-user-plus"></i> التالي
                    </button>

                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
